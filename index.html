<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberSec | Password Security Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

<!-- Font Awesome for Eye Icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="grid-bg"></div>

<div class="main-container">

    <div class="header">
        <h1>PASSWORD VULNERABILITY ANALYZER</h1>
        <p>Real-time Cybersecurity Strength Assessment</p>
    </div>

    <div class="analyzer-box">

        <label>ENTER PASSWORD</label>

        <div class="input-wrapper">
            <input type="password" id="password" onkeyup="checkStrength()" placeholder="Enter secure password">
            <i class="fa-solid fa-eye eye-icon" onclick="togglePassword()"></i>
        </div>

        <div class="strength-label" id="strengthText">Security Status: —</div>

        <div class="progress-container">
            <div class="progress-bar" id="strengthBar"></div>
        </div>

        <div class="metrics">
            <div id="entropy"></div>
            <div id="crackTime"></div>
        </div>

        <!-- Requirements Section -->
        <div class="requirements">
            <p>Password must contain:</p>
            <ul>
                <li id="length">• Minimum 8 characters</li>
                <li id="uppercase">• At least 1 uppercase letter</li>
                <li id="number">• At least 1 number (0-9)</li>
                <li id="special">• At least 1 special character (!@#$...)</li>
            </ul>
        </div>

        <div class="suggestions" id="suggestions"></div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
